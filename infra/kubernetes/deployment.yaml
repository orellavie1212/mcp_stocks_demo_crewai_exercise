# =============================================================================
# Kubernetes Manifests — Agent Runtime Workers (GKE Autopilot)
# =============================================================================
# Teaching note:
#   Stage 4: Agent workers run as Kubernetes Deployments on GKE.
#   HPA (Horizontal Pod Autoscaler) scales up when queue depth increases.
#   Workload Identity means NO API keys in the container — GKE pod = GCP identity.
#
# Variables substituted by setup-gcp.sh / deploy-gke via envsubst:
#   GCP_PROJECT  — GCP project ID
#   GCP_REGION   — GCP region (e.g. us-central1)
#   MCP_URL      — Cloud Run MCP server URL
#   JOB_API_URL  — Cloud Run Job API URL
#   REDIS_URL    — Redis URL (redis://HOST:PORT/0)
#
# Apply (via make deploy-gke — substitution happens automatically):
#   envsubst < infra/kubernetes/deployment.yaml | kubectl apply -f - -n stock-agent
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: stock-agent
  labels:
    app: stock-agent

---
# ServiceAccount with Workload Identity binding
# Teaching note:
#   The annotation here links this K8s SA to the GCP SA provisioned by Terraform.
#   The Terraform resource google_service_account_iam_member.workload_identity_agent
#   must exist BEFORE pods start — it grants this K8s SA the right to impersonate
#   the GCP SA. No credentials in the container at all.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: stock-agent
  annotations:
    iam.gke.io/gcp-service-account: agent-runtime@${GCP_PROJECT}.iam.gserviceaccount.com

---
# ConfigMap — non-sensitive configuration (filled by setup-gcp.sh at deploy time)
# Teaching note:
#   ConfigMaps are for non-secret config. Secrets go in K8s Secrets (below).
#   Both are injected as env vars into the pod — the app sees no difference.
apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-agent-config
  namespace: stock-agent
data:
  gcp_project: "${GCP_PROJECT}"
  gcp_region: "${GCP_REGION}"
  mcp_server_url: "${MCP_URL}"
  job_api_url: "${JOB_API_URL}"
  redis_url: "${REDIS_URL}"
  langfuse_url: "${LANGFUSE_URL}"
  langfuse_public_key: "${LANGFUSE_PUBLIC_KEY}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: stock-agent
  labels:
    app: agent-runtime
    component: worker
spec:
  replicas: 2  # Start with 2 — HPA will scale up/down
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: agent-runtime

      # Terminate gracefully — let current job finish
      terminationGracePeriodSeconds: 660  # 11 min > max job timeout

      containers:
        - name: worker
          image: ${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/stock-agent/agent-runtime:latest
          imagePullPolicy: Always

          command: ["python", "worker.py", "--mode", "pubsub"]

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"

          env:
            - name: WORKER_MODE
              value: "pubsub"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_FORMAT
              value: "json"
            - name: LLM_PROVIDER
              value: "vertex_ai"
            - name: GCP_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: gcp_project
            - name: GCP_REGION
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: gcp_region
            - name: MCP_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: mcp_server_url
            - name: JOB_API_URL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: job_api_url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: redis_url
            - name: PUBSUB_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: gcp_project
            - name: FIRESTORE_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: gcp_project
            # Langfuse observability — traces every LLM call
            - name: LANGFUSE_ENABLED
              value: "true"
            - name: LANGFUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: langfuse_url
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: langfuse_public_key
            # Secrets injected from Kubernetes Secret (populated by setup-gcp.sh)
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: internal_api_token
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secrets
                  key: langfuse_secret_key

          livenessProbe:
            exec:
              command: ["python", "-c", "print('alive')"]
            initialDelaySeconds: 30
            periodSeconds: 60

      # Anti-affinity: spread pods across nodes for resilience
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: agent-runtime
                topologyKey: kubernetes.io/hostname

---
# HPA — Scale workers based on Pub/Sub queue depth
# Teaching note:
#   Scale UP when queue has > 5 unprocessed messages per pod
#   Scale DOWN when queue is empty (minReplicas=1 — keep one warm)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-runtime-hpa
  namespace: stock-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-runtime
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: pubsub.googleapis.com|subscription|num_undelivered_messages
          selector:
            matchLabels:
              resource.labels.subscription_id: agent-worker-sub
        target:
          type: AverageValue
          averageValue: "5"  # 1 new pod per 5 pending messages
